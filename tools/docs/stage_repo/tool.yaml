name: docs.stage_repo
description: Stage an explicit repository into an isolated preview workspace for Sourcey preview generation.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  repo_root:
    type: string
    required: false
    description: Repository root to stage into a preview workspace.
  preview_plan:
    type: json
    required: true
    description: Preview plan emitted by docs.prepare_preview.
scopes:
  - docs.write
runx:
  artifacts:
    wrap_as: preview_workspace
