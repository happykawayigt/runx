name: docs.package_preview
description: Package a docs scan plus optional Sourcey preview run into a docs preview packet.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  docs_scan_packet:
    type: json
    required: true
    description: Docs scan packet emitted by docs-scan.
  preview_plan:
    type: json
    required: true
    description: Preview plan emitted by docs.prepare_preview.
  preview_workspace:
    type: json
    required: false
    description: Preview workspace emitted by docs.stage_repo.
  sourcey_packet:
    type: json
    required: false
    description: Packaged Sourcey run packet emitted by the nested Sourcey run.
scopes:
  - docs.read
runx:
  artifacts:
    wrap_as: docs_preview_packet
