name: docs.prepare_preview
description: Prepare a bounded Sourcey preview plan from a docs scan packet.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  repo_root:
    type: string
    required: false
    description: Repository root for the explicit preview target.
  docs_scan_packet:
    type: json
    required: true
    description: Docs scan packet emitted by docs-scan.
  preview_context:
    type: string
    required: false
    description: Optional operator-authored preview context.
  sourcey_bin:
    type: string
    required: false
    description: Optional Sourcey CLI path to carry into the preview plan.
scopes:
  - docs.read
runx:
  artifacts:
    wrap_as: preview_plan
