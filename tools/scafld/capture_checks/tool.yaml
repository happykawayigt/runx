name: scafld.capture_checks
description: Capture the native `scafld checks --json` payload without treating a failing check as a tool failure.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  task_id:
    type: string
    required: true
    description: scafld task id whose projection check surface should be captured.
  fixture:
    type: string
    required: false
    description: Workspace root containing the governed `.ai/` state.
  cwd:
    type: string
    required: false
    description: Optional explicit working directory used when fixture is absent.
  scafld_bin:
    type: string
    required: false
    description: Explicit scafld executable path.
scopes:
  - scafld:projection:read
