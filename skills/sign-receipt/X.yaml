skill: sign-receipt
version: "0.1.0"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
harness:
  cases:
    - name: attest-external-refund
      inputs:
        action: Issued a $40.00 goodwill refund in the provider console for order ORD-7741.
        principal: ops:jordan
        claim: A $40.00 refund for order ORD-7741 was completed in the provider console on 2026-06-14.
        evidence:
          - ref: provider:refund/re_3PqL2x
            digest: sha256:b1c9e0a4f2d7c6e8a3b50f9d2c41a7e8f06b3c1d9e2a4f7c8b0d6e3a1f5c9b2d4
            proves: provider-side refund transaction settled for order ORD-7741
          - ref: approval:console-signoff/ap_5512
            digest: sha256:7d4e1a90c3b62f8e5a07d2c19b4f6e3a8c0d51b7e9a2f4c6b8d03e1a5f7c9b240
            proves: console approval recorded before the refund executed
        scope:
          rely_for: downstream dispute and reconciliation runs referencing ORD-7741
      caller:
        answers:
          agent_task.sign-receipt.output:
            attestation:
              action: Issued a $40.00 goodwill refund in the provider console for order ORD-7741.
              claim: A $40.00 refund for order ORD-7741 was completed in the provider console on 2026-06-14.
              principal: ops:jordan
              evidence_refs:
                - ref: provider:refund/re_3PqL2x
                  digest: sha256:b1c9e0a4f2d7c6e8a3b50f9d2c41a7e8f06b3c1d9e2a4f7c8b0d6e3a1f5c9b2d4
                  proves: provider-side refund transaction settled for order ORD-7741
                - ref: approval:console-signoff/ap_5512
                  digest: sha256:7d4e1a90c3b62f8e5a07d2c19b4f6e3a8c0d51b7e9a2f4c6b8d03e1a5f7c9b240
                  proves: console approval recorded before the refund executed
              signed: true
              attestation_id: att_01HZ9K4REFND7741
              bound_receipt_ref: ledger:receipt/rcpt_att_01HZ9K4REFND7741
              scope:
                rely_for: downstream dispute and reconciliation runs referencing ORD-7741
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: sign-receipt-needs-subject
      inputs: {}
      expect:
        status: needs_agent

runners:
  agent:
    type: agent

  sign-receipt:
    default: true
    type: agent-task
    agent: reviewer
    task: sign-receipt
    outputs:
      attestation: object
    artifacts:
      wrap_as: attestation_packet
      packet: runx.attestation.v1
    inputs:
      action:
        type: string
        required: true
        description: "What was done, off-runtime."
      evidence:
        type: json
        required: true
        description: "References and digests proving the action, each with what it proves. References only; no raw content or secret values."
      principal:
        type: string
        required: true
        description: "The actor the attestation names."
      claim:
        type: string
        required: true
        description: "The exact assertion to be signed."
      scope:
        type: json
        required: false
        description: "Bound on what the attestation may be relied on for downstream."
