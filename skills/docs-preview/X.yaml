skill: docs-preview
version: "0.1.0"

catalog:
  kind: chain
  audience: public
  visibility: public


runners:
  docs-preview:
    default: true
    type: chain
    inputs:
      repo_root:
        type: string
        required: false
        description: "Repository root to inspect and stage for preview generation."
      repo_url:
        type: string
        required: false
        description: "Canonical repository URL when known."
      docs_url:
        type: string
        required: false
        description: "Existing docs URL when known."
      default_branch:
        type: string
        required: false
        description: "Default branch for the target repo."
      preview_context:
        type: string
        required: false
        description: "Optional operator-authored preview context."
      sourcey_bin:
        type: string
        required: false
        description: "Explicit Sourcey executable or JS entrypoint."
    chain:
      name: docs-preview
      owner: runx
      steps:
        - id: scan-target
          label: scan target docs surface
          skill: ../docs-scan
          runner: docs-scan
          scopes:
            - docs.read
        - id: plan-preview
          label: decide whether to generate a preview
          tool: docs.prepare_preview
          scopes:
            - docs.read
          context:
            docs_scan_packet: scan-target.docs_scan_packet.data
        - id: stage-preview
          label: stage isolated preview workspace
          tool: docs.stage_repo
          scopes:
            - docs.write
          context:
            preview_plan: plan-preview.preview_plan.data
        - id: run-sourcey
          label: generate staged Sourcey preview
          skill: ../sourcey
          runner: sourcey
          scopes:
            - sourcey.build
            - sourcey.verify
            - fs.write
            - fs.read
            - git.read
            - cli.read
          context:
            project: stage-preview.preview_workspace.data.staged_repo_root
            repo_root: stage-preview.preview_workspace.data.staged_repo_root
            brand_name: plan-preview.preview_plan.data.sourcey_inputs.brand_name
            homepage_url: plan-preview.preview_plan.data.sourcey_inputs.homepage_url
            docs_inputs: plan-preview.preview_plan.data.sourcey_inputs.docs_inputs
            output_dir: stage-preview.preview_workspace.data.output_dir
            sourcey_bin: plan-preview.preview_plan.data.sourcey_inputs.sourcey_bin
        - id: package-preview
          label: package preview packet
          tool: docs.package_preview
          scopes:
            - docs.read
          context:
            docs_scan_packet: scan-target.docs_scan_packet.data
            preview_plan: plan-preview.preview_plan.data
            preview_workspace: stage-preview.preview_workspace.data
            sourcey_packet: run-sourcey.sourcey_packet.data
      policy:
        transitions:
          - to: stage-preview
            field: plan-preview.preview_plan.data.should_generate
            equals: true
          - to: run-sourcey
            field: plan-preview.preview_plan.data.should_generate
            equals: true
    artifacts:
      wrap_as: docs_preview_packet
