name: bookkeeper-verify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skill branch
        uses: actions/checkout@v7
        with:
          ref: codex/frantic-bookkeeper

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install released runx CLI
        run: npm install --global @runxhq/cli@0.7.1

      - name: Run deterministic fixture tests
        run: node skills/bookkeeper/test.mjs

      - name: Inspect skill package
        run: runx skill inspect skills/bookkeeper --json

      - name: Run official harness
        run: runx harness skills/bookkeeper --json --receipt-dir "$RUNNER_TEMP/bookkeeper-receipts"
